<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; padding: 0; }
  .pd-title {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #0d1b3e;
    margin: 0 0 20px 0;
  }
  #pd-root {
    font-family: 'Segoe UI', Arial, sans-serif;
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    color: #1a1a2e;
  }
  #pd-root * { box-sizing: border-box; }

  .pd-controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 28px;
    align-items: center;
  }
  .pd-search {
    flex: 1 1 260px;
    height: 44px;
    padding: 10px 16px;
    border: 2px solid #e0e4ef;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .pd-search:focus { border-color: #0057b8; }
  .pd-filter {
    padding: 10px 14px;
    border: 2px solid #e0e4ef;
    border-radius: 8px;
    font-size: 14px;
    background: #fff;
    cursor: pointer;
    min-width: 170px;
  }
  .pd-count {
    font-size: 13px;
    color: #6b7280;
    margin-left: auto;
    white-space: nowrap;
  }

  .pd-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
  }
  .pd-card {
    background: #fff;
    border: 1.5px solid #e8ecf4;
    border-radius: 12px;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: box-shadow .18s, border-color .18s, transform .15s;
    position: relative;
  }
  .pd-card:hover {
    box-shadow: 0 4px 18px rgba(0,87,184,.10);
    border-color: #0057b8;
    transform: translateY(-2px);
  }
  .pd-flag {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 22px;
    line-height: 1;
  }
  .pd-name {
    font-size: 15px;
    font-weight: 700;
    color: #0d1b3e;
    padding-right: 36px;
    line-height: 1.3;
  }
  .pd-address {
    font-size: 13px;
    color: #4b5563;
    line-height: 1.45;
  }
  .pd-country-tag {
    display: inline-block;
    background: #eef3fb;
    color: #0057b8;
    font-size: 11.5px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    margin-top: 4px;
    width: fit-content;
  }
  .pd-website {
    margin-top: auto;
    padding-top: 10px;
  }
  .pd-website a {
    font-size: 12.5px;
    color: #0057b8;
    text-decoration: none;
    word-break: break-all;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .pd-website a:hover { text-decoration: underline; }
  .pd-website a::before {
    content: '→';
    font-size: 13px;
  }
  .pd-no-web {
    font-size: 12px;
    color: #9ca3af;
    margin-top: auto;
    padding-top: 10px;
  }

  .pd-empty {
    text-align: center;
    padding: 48px 24px;
    color: #6b7280;
    font-size: 15px;
    grid-column: 1 / -1;
  }

  @media (max-width: 600px) {
    .pd-grid { grid-template-columns: 1fr; }
    .pd-controls { flex-direction: column; }
    .pd-count { margin-left: 0; }
  }
</style>

<div id="pd-root">

  <div class="pd-grid" id="pdGrid"></div>
</div>

  // Populate country dropdown
  var countries = {};
  DATA.forEach(function(d){ countries[d.co] = true; });
  var sorted = Object.keys(countries).sort();
  var sel = document.getElementById('pdCountry');
  sorted.forEach(function(c){
    var o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });

  function esc(str){ return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  window.pdRender = function(){
    var q = document.getElementById('pdSearch').value.toLowerCase();
    var cf = document.getElementById('pdCountry').value;
    var grid = document.getElementById('pdGrid');
    var filtered = DATA.filter(function(d){
      var match = !q || (d.n+' '+d.a+' '+d.c+' '+d.co).toLowerCase().indexOf(q) > -1;
      var cMatch = !cf || d.co === cf;
      return match && cMatch;
    });

    document.getElementById('pdCount').textContent = filtered.length + ' partner' + (filtered.length !== 1 ? 's' : '');

    if(!filtered.length){
      grid.innerHTML = '<div class="pd-empty">No partners found for this search.</div>';
      return;
    }

    grid.innerHTML = filtered.map(function(d){
      var flag = FLAGS[d.cc] || '';
      var addrLine = [d.a, d.c].filter(Boolean).join(', ');
      var webHtml = d.w
        ? '<div class="pd-website"><a href="' + esc(d.w) + '" target="_blank" rel="noopener">' + esc(d.w.replace(/^https?:\/\//,'').replace(/\/$/,'')) + '</a></div>'
        : '<div class="pd-no-web">No website listed</div>';
      return '<div class="pd-card">'
        + '<span class="pd-flag">' + flag + '</span>'
        + '<div class="pd-name">' + esc(d.n) + '</div>'
        + (addrLine ? '<div class="pd-address">' + esc(addrLine) + '</div>' : '')
        + '<span class="pd-country-tag">' + esc(d.co) + '</span>'
        + webHtml
        + '</div>';
    }).join('');
  };
