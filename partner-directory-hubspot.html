      var matchQ = !q || (p.n+p.a+p.c+p.co).toLowerCase().indexOf(q) > -1;
      var matchC = !cc || p.cc === cc;
      return matchQ && matchC;
    });
    document.getElementById('pdCount').textContent = filtered.length + ' partner' + (filtered.length !== 1 ? 's' : '');
    if (!filtered.length) {
      grid.innerHTML = '<div class="pd-empty">No partners found for your search.</div>';
      notifyHeight();
      return;
    }
    grid.innerHTML = filtered.map(function(p) {
      var flag = FLAGS[p.cc] || '';
      var addr = [p.a, p.c].filter(Boolean).join(', ');
      var websiteHtml = p.w
        ? '<div class="pd-website"><a href="' + p.w + '" target="_blank" rel="noopener noreferrer">' + p.w.replace(/^https?:\/\//, '') + '</a></div>'
        : '<div class="pd-no-web"><a href="https://www.resqequipment.com/contact" target="_blank" rel="noopener noreferrer">\u2192 Contact RESQ to reach this partner</a></div>';
      return '<div class="pd-card">'
        + (flag ? '<span class="pd-flag">' + flag + '</span>' : '')
        + '<div class="pd-name">' + p.n + '</div>'
        + (addr ? '<div class="pd-address">' + addr + '</div>' : '')
        + '<span class="pd-country-tag">' + p.co + '</span>'
        + websiteHtml
        + '</div>';
    }).join('');
    notifyHeight();
  }

  function pdInitCountries() {
    var seen = {};
    var opts = DATA.map(function(p){ return {co: p.co, cc: p.cc}; })
      .filter(function(x){ if(seen[x.cc]) return false; seen[x.cc]=1; return true; })
      .sort(function(a,b){ return a.co.localeCompare(b.co); });
    var sel = document.getElementById('pdCountry');
    opts.forEach(function(o){
      var opt = document.createElement('option');
      opt.value = o.cc;
      opt.textContent = o.co;
      sel.appendChild(opt);
    });
    var total = DATA.length;
    document.getElementById('pdSubtitle').textContent = total + ' authorised partners across 30+ countries';
  }

  function notifyHeight() {
    var h = document.getElementById('pd-root').scrollHeight + 60;
    window.parent.postMessage({ frameHeight: h }, '*');
  }

  pdInitCountries();
  pdRender();

  // Re-notify on window resize
  window.addEventListener('resize', function() {
    setTimeout(notifyHeight, 100);
  });
})();
</script>
